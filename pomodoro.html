<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 · Stargazer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --amethyst: #a78bfa;
    --amethyst-deep: #7c3aed;
    --amethyst-dark: #4c1d95;
    --violet-glow: #c4b5fd;
    --teal: #2dd4bf;
    --teal-glow: #5eead4;
    --indigo: #818cf8;
    --indigo-glow: #a5b4fc;
    --ivory: #f5f0e8;
    --ivory-dim: #a89a8c;
    --void: #07040f;
    --void-soft: #0c0a18;
    --surface: rgba(255,255,255,0.025);
    --surface-hover: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.06);
    --border-focus: rgba(167,139,250,0.25);
    --text: #e8e2f0;
    --text-subtle: #8a7f9a;
    --glow-soft: rgba(167,139,250,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-weight: 300;
    background: var(--void);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }

  /* ════════════════ COSMIC BACKGROUND ════════════════ */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    pointer-events: none;
    z-index: 0;
    animation: nebula-drift 30s ease-in-out infinite;
  }
  .nebula-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation-delay: 0s;
  }
  .nebula-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(45,212,191,0.06) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation-delay: -15s;
  }
  .nebula-3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(129,140,248,0.08) 0%, transparent 70%);
    top: 40%; left: 50%;
    animation-delay: -22s;
  }

  @keyframes nebula-drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(30px, -20px) scale(1.08); }
    50%  { transform: translate(-15px, 25px) scale(0.95); }
    75%  { transform: translate(-25px, -15px) scale(1.04); }
  }

  #starfield {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ════════════════ SHOOTING STARS ════════════════ */
  .shooting-star {
    position: fixed;
    z-index: 2;
    pointer-events: none;
    animation: star-fall 0.7s ease-out forwards;
  }
  .shooting-star .head {
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 6px 3px rgba(196,181,253,0.8);
  }
  .shooting-star .tail {
    width: 100px; height: 1.5px;
    background: linear-gradient(to left, rgba(196,181,253,0.8), transparent);
    transform-origin: right center;
    transform: translateX(-3px);
  }

  @keyframes star-fall {
    0%   { transform: translate(0, 0) rotate(-35deg); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate(-500px, 400px) rotate(-35deg); opacity: 0; }
  }

  /* ════════════════ MAIN CONTAINER ════════════════ */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
  }

  /* ════════════════ TITLE ════════════════ */
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: 0.35em;
    color: var(--text-subtle);
    margin-bottom: 2.8rem;
    text-transform: lowercase;
  }
  .page-title .tick {
    display: inline-block;
    width: 18px; height: 1px;
    background: var(--amethyst);
    vertical-align: middle;
    margin: 0 0.5rem;
    opacity: 0.4;
    transition: opacity 2s;
  }

  /* ════════════════ MODE TABS ════════════════ */
  .mode-tabs {
    display: inline-flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2.5rem;
    padding: 3px;
    margin-bottom: 2.8rem;
    backdrop-filter: blur(16px);
  }

  .mode-tab {
    padding: 0.5rem 1.3rem;
    border: none;
    border-radius: 2.5rem;
    background: transparent;
    color: var(--text-subtle);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    white-space: nowrap;
  }

  .mode-tab:hover { color: var(--ivory); }

  .mode-tab.active {
    background: var(--surface-hover);
    color: var(--ivory);
    box-shadow: 0 0 24px var(--glow-soft);
    text-shadow: 0 0 12px var(--glow-soft);
  }

  /* ════════════════ TIMER — MULTI-RING LENS ════════════════ */
  .lens {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 2.2rem;
  }

  .lens svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
    transition: filter 0.6s;
  }

  .lens .ring-outer { fill: none; stroke: var(--border); stroke-width: 1; }
  .lens .ring-dash   { fill: none; stroke: rgba(167,139,250,0.12); stroke-width: 0.5; stroke-dasharray: 4 22; }
  .lens .ring-track  { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 2.5; }
  .lens .ring-progress {
    fill: none;
    stroke: var(--current-accent, #a78bfa);
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
  }

  /* Reticle crosshair */
  .reticle {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
  }
  .reticle::before, .reticle::after {
    content: '';
    position: absolute;
    background: var(--violet-glow);
  }
  .reticle::before {
    top: 0; bottom: 0; left: 50%;
    width: 1px;
  }
  .reticle::after {
    left: 0; right: 0; top: 50%;
    height: 1px;
  }

  /* Timer digits */
  .timer-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 5rem;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: var(--ivory);
    text-shadow: 0 0 60px var(--glow-soft);
    transition: text-shadow 0.6s;
  }

  .timer-display .separator {
    font-style: italic;
    opacity: 0.3;
    margin: 0 -0.05em;
    transition: opacity 0.3s;
  }

  .timer-label {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-subtle);
    transition: color 0.5s;
  }

  /* ════════════════ CONTROLS ════════════════ */
  .controls {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 2.2rem;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .btn:active { transform: scale(0.95); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text-subtle);
    border: 1px solid var(--border);
    padding: 0.6rem 1.4rem;
    border-radius: 2rem;
    font-size: 0.78rem;
    backdrop-filter: blur(8px);
  }
  .btn-ghost:hover {
    background: var(--surface-hover);
    color: var(--ivory);
    border-color: var(--border-focus);
    box-shadow: 0 0 20px var(--glow-soft);
  }

  .btn-main {
    background: rgba(167,139,250,0.15);
    color: var(--ivory);
    border: 1px solid rgba(167,139,250,0.3);
    padding: 0.7rem 2.5rem;
    border-radius: 2.5rem;
    font-size: 0.85rem;
    min-width: 150px;
    letter-spacing: 0.06em;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 40px rgba(167,139,250,0.12);
  }

  .btn-main:hover {
    background: rgba(167,139,250,0.22);
    border-color: rgba(167,139,250,0.5);
    box-shadow: 0 0 60px rgba(167,139,250,0.2);
    transform: translateY(-1px) scale(1.02);
  }

  .btn-main.running {
    background: rgba(167,139,250,0.25);
    border-color: rgba(167,139,250,0.6);
    box-shadow: 0 0 60px rgba(167,139,250,0.25), inset 0 0 40px rgba(167,139,250,0.05);
  }

  /* ════════════════ STATS ════════════════ */
  .stats {
    display: inline-flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1rem;
    backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .stat {
    text-align: center;
    padding: 1rem 1.8rem;
    position: relative;
  }
  .stat:first-child::after {
    content: '';
    position: absolute;
    right: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: var(--border);
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--ivory);
    transition: color 0.5s;
  }

  .stat-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-top: 0.25rem;
  }

  /* ════════════════ SETTINGS ════════════════ */
  .settings-trigger {
    position: fixed;
    top: 1.3rem;
    right: 1.3rem;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-subtle);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.35s;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .settings-trigger:hover {
    border-color: var(--border-focus);
    color: var(--ivory);
    box-shadow: 0 0 20px var(--glow-soft);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(3,2,8,0.7);
    backdrop-filter: blur(6px);
    z-index: 299;
    display: none;
    transition: opacity 0.35s;
    opacity: 0;
  }
  .overlay.show { display: block; opacity: 1; }

  .settings-panel {
    position: fixed;
    top: 0; right: -400px;
    width: 380px; height: 100vh;
    background: rgba(12,10,24,0.96);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(24px);
    padding: 2.5rem 2rem;
    transition: right 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 300;
    overflow-y: auto;
  }
  .settings-panel.open { right: 0; }

  .settings-panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--ivory);
    margin-bottom: 2.2rem;
    letter-spacing: 0.08em;
  }

  .settings-close {
    position: absolute;
    top: 1.3rem; right: 1.3rem;
    background: none; border: none;
    color: var(--text-subtle);
    cursor: pointer;
    font-size: 1.3rem;
    transition: color 0.3s;
  }
  .settings-close:hover { color: var(--ivory); }

  .setting-group {
    margin-bottom: 1.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  .setting-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-bottom: 0.5rem;
  }
  .setting-group input[type="number"] {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    color: var(--ivory);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: all 0.3s;
  }
  .setting-group input[type="number"]:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 16px var(--glow-soft);
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
  }
  .setting-row span {
    font-size: 0.82rem;
    color: var(--ivory-dim);
  }
  .setting-row input[type="checkbox"] {
    accent-color: #a78bfa;
    width: 18px; height: 18px;
    cursor: pointer;
  }

  .btn-save {
    margin-top: 1.5rem;
    width: 100%;
    padding: 0.8rem;
    background: rgba(167,139,250,0.15);
    color: var(--ivory);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.35s;
  }
  .btn-save:hover {
    background: rgba(167,139,250,0.25);
    border-color: rgba(167,139,250,0.5);
    box-shadow: 0 0 30px rgba(167,139,250,0.18);
  }

  /* ════════════════ COMPLETION TOAST ════════════════ */
  .toast {
    position: fixed;
    top: 2rem; left: 50%;
    transform: translateX(-50%) translateY(-120px);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--ivory);
    background: rgba(12,10,24,0.9);
    border: 1px solid var(--border-focus);
    border-radius: 3rem;
    padding: 0.7rem 2rem;
    z-index: 500;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 40px rgba(124,58,237,0.2);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ════════════════ RESPONSIVE ════════════════ */
  @media (max-width: 480px) {
    .lens { width: 260px; height: 260px; }
    .timer-display { font-size: 3.8rem; }
    .btn-main { min-width: 130px; padding: 0.6rem 2rem; }
    .stats { flex-direction: row; }
    .stat { padding: 0.8rem 1.3rem; }
    .settings-panel { width: 300px; }
    .mode-tab { padding: 0.45rem 1rem; font-size: 0.7rem; }
  }
</style>
</head>
<body>

<!-- Nebula glows -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Starfield canvas -->
<canvas id="starfield"></canvas>

<!-- Toast -->
<div class="toast" id="toast">&#x2726; 完成了</div>

<!-- Settings -->
<button class="settings-trigger" onclick="toggleSettings()" aria-label="设置">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2m0 10v2M1 8h2m10 0h2M3.05 3.05l1.41 1.41m7.08 7.08l1.41 1.41M3.05 12.95l1.41-1.41m7.08-7.08l1.41-1.41"/></svg>
</button>
<div class="overlay" id="overlay" onclick="toggleSettings()"></div>

<div class="settings-panel" id="settingsPanel">
  <button class="settings-close" onclick="toggleSettings()">&times;</button>
  <h2>Preferences</h2>
  <div class="setting-group">
    <label>工作时长 · 分钟</label>
    <input type="number" id="setWork" value="25" min="1" max="90">
  </div>
  <div class="setting-group">
    <label>短休息 · 分钟</label>
    <input type="number" id="setShort" value="5" min="1" max="30">
  </div>
  <div class="setting-group">
    <label>长休息 · 分钟</label>
    <input type="number" id="setLong" value="15" min="1" max="60">
  </div>
  <div class="setting-group">
    <label>长休息间隔 · 次</label>
    <input type="number" id="setInterval" value="4" min="2" max="8">
  </div>
  <div class="setting-row">
    <span>声音提醒</span>
    <input type="checkbox" id="setSound" checked>
  </div>
  <button class="btn-save" onclick="applySettings()">保存设置</button>
</div>

<!-- Main UI -->
<div class="container">
  <div class="page-title">
    <span class="tick"></span> pomodoro <span class="tick"></span>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work" onclick="switchMode('work')">专注</button>
    <button class="mode-tab" data-mode="shortBreak" onclick="switchMode('shortBreak')">短休</button>
    <button class="mode-tab" data-mode="longBreak" onclick="switchMode('longBreak')">长休</button>
  </div>

  <div class="lens" id="lens">
    <!-- Outer decorative ring -->
    <svg viewBox="0 0 320 320" class="lens-outer">
      <circle class="ring-outer" cx="160" cy="160" r="152"></circle>
      <circle class="ring-dash" cx="160" cy="160" r="148"></circle>
    </svg>
    <!-- Progress ring -->
    <svg viewBox="0 0 320 320" class="lens-progress">
      <circle class="ring-track" cx="160" cy="160" r="142"></circle>
      <circle class="ring-progress" id="progress" cx="160" cy="160" r="142"></circle>
    </svg>
    <!-- Inner decorative ring -->
    <svg viewBox="0 0 320 320">
      <circle class="ring-outer" cx="160" cy="160" r="130" opacity="0.3"></circle>
    </svg>

    <div class="reticle"></div>

    <div class="timer-display" id="timerDisplay">
      <span id="minDisplay">25</span><span class="separator">:</span><span id="secDisplay">00</span>
    </div>
    <div class="timer-label" id="timerLabel">FOCUS</div>
  </div>

  <div class="controls">
    <button class="btn btn-ghost" onclick="resetTimer()">重置</button>
    <button class="btn btn-main" id="startBtn" onclick="toggleTimer()">开始专注</button>
    <button class="btn btn-ghost" onclick="skipTimer()">跳过</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="pomodoroCount">0</div>
      <div class="stat-label">已完成</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalMinutes">0</div>
      <div class="stat-label">专注分钟</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  COSMIC STARFIELD — layered particle system
// ═══════════════════════════════════════════
(function starfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function size() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  size(); window.addEventListener('resize', size);

  // Three depth layers
  const LAYERS = [
    { count: 60,  size: [0.3, 0.9], alpha: [0.1, 0.5], speed: 0.015, hue: [250, 280] },  // distant
    { count: 90,  size: [0.6, 1.4], alpha: [0.2, 0.7], speed: 0.03,  hue: [260, 300] },  // mid
    { count: 40,  size: [1.0, 2.2], alpha: [0.3, 0.9], speed: 0.06,  hue: [270, 320] },  // near
  ];

  LAYERS.forEach(layer => {
    for (let i = 0; i < layer.count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: layer.size[0] + Math.random() * (layer.size[1] - layer.size[0]),
        alphaMin: layer.alpha[0], alphaMax: layer.alpha[1],
        alpha: Math.random(),
        pulseDir: Math.random() > 0.5 ? 1 : -1,
        pulseSpeed: 0.003 + Math.random() * 0.012,
        speed: layer.speed,
        hue: layer.hue[0] + Math.random() * (layer.hue[1] - layer.hue[0]),
      });
    }
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const s of stars) {
      s.alpha += s.pulseSpeed * s.pulseDir;
      if (s.alpha >= s.alphaMax) s.pulseDir = -1;
      if (s.alpha <= s.alphaMin) s.pulseDir = 1;

      // Slow upward drift
      s.y -= s.speed;
      if (s.y < -10) { s.y = canvas.height + 10; s.x = Math.random() * canvas.width; }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, 60%, 78%, ${s.alpha})`;
      ctx.fill();

      // Glow halo on brighter stars
      if (s.alpha > 0.65 && s.r > 0.9) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 70%, 70%, ${s.alpha * 0.06})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════
//  SHOOTING STARS
// ═══════════════════════════════════════════
function spawnStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  el.innerHTML = '<div class="tail"></div><div class="head"></div>';
  el.style.top = Math.random() * 40 + '%';
  el.style.left = Math.random() * 70 + 15 + '%';
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.gap = '0';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}
setInterval(() => { if (Math.random() < 0.3) spawnStar(); }, 3500);

// ═══════════════════════════════════════════
//  TIMER ENGINE
// ═══════════════════════════════════════════
const modeMeta = {
  work:       { label: 'FOCUS',      color: '#a78bfa', glow: 'rgba(167,139,250,0.4)'  },
  shortBreak: { label: 'SHORT BREAK', color: '#2dd4bf', glow: 'rgba(45,212,191,0.35)'   },
  longBreak:  { label: 'LONG BREAK',  color: '#818cf8', glow: 'rgba(129,140,248,0.38)'  },
};

let config = { work: 25, short: 5, long: 15, interval: 4, sound: true };
let currentMode = 'work';
let totalSeconds = config.work * 60;
let remainingSeconds = totalSeconds;
let intervalId = null;
let running = false;
let pomodoroCount = 0;
let totalFocusMinutes = 0;
let workSessionCount = 0;

const circumference = 2 * Math.PI * 142;
const progressEl = document.getElementById('progress');
const minEl = document.getElementById('minDisplay');
const secEl = document.getElementById('secDisplay');
const labelEl = document.getElementById('timerLabel');
const startBtn = document.getElementById('startBtn');
const lens = document.getElementById('lens');
const toast = document.getElementById('toast');
const root = document.documentElement;

progressEl.style.strokeDasharray = circumference;
progressEl.style.strokeDashoffset = 0;

function setVar(k, v) { root.style.setProperty(k, v); }

function updateDisplay() {
  const m = Math.floor(remainingSeconds / 60);
  const s = remainingSeconds % 60;
  minEl.textContent = String(m).padStart(2, '0');
  secEl.textContent = String(s).padStart(2, '0');
  progressEl.style.strokeDashoffset = circumference * (1 - remainingSeconds / totalSeconds);
  document.title = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} · pomodoro`;
}

function switchMode(mode) {
  if (running) return;
  currentMode = mode;
  const dur = { work: config.work, shortBreak: config.short, longBreak: config.long };
  totalSeconds = dur[mode] * 60;
  remainingSeconds = totalSeconds;

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

  const meta = modeMeta[mode];
  setVar('--current-accent', meta.color);
  progressEl.style.stroke = meta.color;
  lens.querySelectorAll('svg').forEach(s => {
    s.style.filter = `drop-shadow(0 0 14px ${meta.glow})`;
  });
  labelEl.textContent = meta.label;

  updateDisplay();
}

function toggleTimer() {
  if (running) {
    clearInterval(intervalId);
    running = false;
    startBtn.textContent = currentMode === 'work' ? '继续专注' : '继续休息';
    startBtn.classList.remove('running');
  } else {
    running = true;
    const label = currentMode === 'work' ? '暂停' : '暂停休息';
    startBtn.textContent = label;
    startBtn.classList.add('running');
    intervalId = setInterval(() => {
      if (remainingSeconds <= 0) {
        clearInterval(intervalId);
        running = false;
        onComplete();
        return;
      }
      remainingSeconds--;
      updateDisplay();
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(intervalId);
  running = false;
  startBtn.textContent = currentMode === 'work' ? '开始专注' : '开始休息';
  startBtn.classList.remove('running');
  const dur = { work: config.work, shortBreak: config.short, longBreak: config.long };
  totalSeconds = dur[currentMode] * 60;
  remainingSeconds = totalSeconds;
  updateDisplay();
}

function skipTimer() {
  clearInterval(intervalId);
  running = false;
  onComplete();
}

function onComplete() {
  if (currentMode === 'work') {
    pomodoroCount++;
    totalFocusMinutes += config.work;
    workSessionCount++;
    document.getElementById('pomodoroCount').textContent = pomodoroCount;
    document.getElementById('totalMinutes').textContent = totalFocusMinutes;

    // Brief toast
    showToast('✦ 专注完成');

    if (workSessionCount >= config.interval) {
      workSessionCount = 0;
      switchMode('longBreak');
    } else {
      switchMode('shortBreak');
    }
  } else {
    showToast('☁ 休息结束');
    switchMode('work');
  }
  startBtn.textContent = '开始专注';
  startBtn.classList.remove('running');
  if (config.sound) chime();
  pulseLens();
}

function chime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freq = [330, 415, 494, 554, 660]; // E4-G#4-B4-C#5-E5
    freq.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      const t = ctx.currentTime + i * 0.14;
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.003, t + 0.6);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + 0.6);
    });
  } catch(e) {}
}

function pulseLens() {
  lens.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
  lens.style.transform = 'scale(1.03)';
  setTimeout(() => { lens.style.transform = 'scale(1)'; }, 250);
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('overlay');
  const open = panel.classList.toggle('open');
  overlay.classList.toggle('show', open);
}

function applySettings() {
  config.work     = clamp(1, 90, parseInt(document.getElementById('setWork').value) || 25);
  config.short    = clamp(1, 30, parseInt(document.getElementById('setShort').value) || 5);
  config.long     = clamp(1, 60, parseInt(document.getElementById('setLong').value) || 15);
  config.interval = clamp(2, 8,  parseInt(document.getElementById('setInterval').value) || 4);
  config.sound    = document.getElementById('setSound').checked;
  resetTimer();
  toggleSettings();
}

function clamp(min, max, v) { return Math.max(min, Math.min(max, v)); }

// ── Init ──
setVar('--current-accent', modeMeta.work.color);
progressEl.style.stroke = modeMeta.work.color;
lens.querySelectorAll('svg').forEach(s => {
  s.style.filter = `drop-shadow(0 0 14px ${modeMeta.work.glow})`;
});
updateDisplay();
</script>
